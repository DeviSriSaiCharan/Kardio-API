name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.11.0
          cache: true
      
      - name: Setup NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "pnpm"
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Lint code
        run: pnpm lint
      
      - name: Build code
        run: pnpm build